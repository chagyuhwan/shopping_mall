<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - KCSHOP</title>
    <link href="style.css" rel="stylesheet">
    <link href="auth.css" rel="stylesheet">
</head>
<body>
    <header class="auth-header">
        <a href="index.html" class="auth-logo">KCSHOP</a>
    </header>
    <main class="auth-main">
        <div class="auth-box">
            <h1 class="auth-title">비밀번호 재설정</h1>
            <form id="resetForm" class="auth-form">
                <div class="auth-field">
                    <label for="password">새 비밀번호</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="6자 이상">
                </div>
                <div class="auth-field">
                    <label for="passwordConfirm">비밀번호 확인</label>
                    <input type="password" id="passwordConfirm" required minlength="6" placeholder="비밀번호 재입력">
                </div>
                <p id="resetMessage" class="auth-message"></p>
                <button type="submit" class="auth-btn">비밀번호 변경</button>
            </form>
            <p class="auth-link-text"><a href="login.html">로그인으로 돌아가기</a></p>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-main">
            <div class="footer-inner">
                <div class="footer-col footer-cs">
                    <div class="footer-block">
                        <h3 class="footer-title">C/S CENTER</h3>
                        <p class="footer-tel">T. {{SITE_TEL}}</p>
                        <p class="footer-hours">{{SITE_HOURS}}</p>
                    </div>
                    <div class="footer-block">
                        <h3 class="footer-title">ACCOUNT</h3>
                        <p class="footer-depositor">예금주 : (주) KCSHOP</p>
                        <p class="footer-account">{{SITE_ACCOUNT}}</p>
                    </div>
                </div>
                <div class="footer-col footer-company">
                    <h2 class="footer-logo">KCSHOP</h2>
                    <div class="footer-info">
                        <p>COMPANY: (주)케이씨샵</p>
                        <p>OWNER: {{SITE_OWNER}} TEL: {{SITE_OWNER_TEL}}</p>
                        <p>ADDRESS: {{SITE_ADDRESS}}</p>
                    </div>
                </div>
                <div class="footer-col footer-return">
                    <div class="footer-block">
                        <h3 class="footer-title">교환/반품주소</h3>
                        <p>{{SITE_RETURN_ADDRESS}}</p>
                    </div>
                    <div class="footer-block">
                        <h3 class="footer-title">SNS</h3>
                        <p class="footer-sns">{{SITE_SNS}}</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#">이용약관</a>
                <a href="#">개인정보처리방침</a>
                <a href="#">이용안내</a>
            </div>
        </div>
    </footer>

    <script>
        const params = new URLSearchParams(location.search);
        const token = params.get('token');
        if (!token) {
            document.getElementById('resetMessage').textContent = '유효하지 않은 링크입니다.';
            document.getElementById('resetMessage').className = 'auth-message error';
            document.getElementById('resetForm').style.display = 'none';
        }
        document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('passwordConfirm').value;
            const msg = document.getElementById('resetMessage');
            if (password !== confirm) {
                msg.textContent = '비밀번호가 일치하지 않습니다.';
                msg.className = 'auth-message error';
                return;
            }
            try {
                const res = await fetch('/api/password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                msg.textContent = data.message;
                msg.className = data.success ? 'auth-message success' : 'auth-message error';
                if (data.success) {
                    setTimeout(() => location.href = '/login', 1500);
                }
            } catch (err) {
                msg.textContent = '오류가 발생했습니다.';
                msg.className = 'auth-message error';
            }
        });
    </script>
</body>
</html>
